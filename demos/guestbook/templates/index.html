<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Guestbook — Kindling</title>
  <style>
    :root { --bg: #18181b; --fg: #fafafa; --muted: #a1a1aa; --line: #3f3f46; --accent: #a78bfa; }
    * { box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }
    main { max-width: 32rem; margin: 0 auto; }
    h1 { font-size: 1.5rem; font-weight: 600; margin: 0 0 0.25rem; }
    .lede { color: var(--muted); font-size: 0.9rem; margin: 0 0 1.5rem; }
    #entries {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      min-height: 6rem;
      margin-bottom: 1.25rem;
      background: rgba(255,255,255,0.02);
    }
    #entries ul { margin: 0; padding-left: 1.25rem; }
    #entries li { margin: 0.35rem 0; }
    .empty { color: var(--muted); margin: 0; font-size: 0.9rem; }
    label { display: block; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 0.35rem; }
    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #27272a;
      color: var(--fg);
      font: inherit;
      margin-bottom: 0.75rem;
    }
    button[type="submit"] {
      background: var(--accent);
      color: #18181b;
      border: none;
      padding: 0.55rem 1.1rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font: inherit;
    }
    code { font-size: 0.88em; }
  </style>
</head>
<body>
  <main>
    <h1>Guestbook</h1>
    <p class="lede"><code>@bind("#entries", "html")</code> + <code>@on</code> on the form.</p>
    <div id="entries">
      {% set es = entries|unwrap %}
      {% if es and es|length %}
      <ul>
        {% for e in es %}<li>{{ e }}</li>{% endfor %}
      </ul>
      {% else %}
      <p class="empty">No messages yet.</p>
      {% endif %}
    </div>
    <form id="add-form" method="post" action="/">
      <label for="msg">Message</label>
      <input id="msg" type="text" name="message" placeholder="Say something" autocomplete="off" />
      <button type="submit">Add</button>
    </form>
  </main>
</body>
</html>
