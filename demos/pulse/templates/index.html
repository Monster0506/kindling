<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pulse - Kindling</title>
  <style>
    :root { --bg: #022c22; --fg: #ecfdf5; --muted: #6ee7b7; --accent: #34d399; }
    * { box-sizing: border-box; }
    body {
      font-family: ui-monospace, "Cascadia Code", monospace;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }
    main { max-width: 28rem; margin: 0 auto; }
    h1 { font-size: 1.15rem; font-weight: 600; margin: 0 0 0.5rem; letter-spacing: -0.02em; }
    p { color: var(--muted); font-size: 0.85rem; margin: 0 0 1.25rem; line-height: 1.5; }
    .row { display: flex; align-items: baseline; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    #tick-readout { font-size: 2rem; font-weight: 700; color: var(--accent); }
    button {
      background: var(--accent);
      color: #022c22;
      border: none;
      padding: 0.45rem 0.9rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font: inherit;
    }
    pre {
      background: rgba(0,0,0,0.25);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      overflow-x: auto;
      margin: 0;
      min-height: 4.5rem;
    }
    code { font-size: 0.9em; }
  </style>
</head>
<body>
  <main>
    <h1>Pulse</h1>
    <p><code>@live("pulse")</code> merges into SSE; the client dispatches <code>kindling-live</code> with that object as <code>detail</code>.</p>
    <div class="row">
      <span id="tick-readout">{{ tick|unwrap }}</span>
      <button type="button" id="pulse-btn">Bump</button>
    </div>
    <p style="font-size:0.8rem;color:var(--muted);margin:0 0 0.35rem">Latest <code>detail</code> from <code>kindling-live</code>:</p>
    <pre id="live-log">(waiting for events...)</pre>
  </main>
  <script>
    (function () {
      if (window.__kindlingPulseDemoLiveLog) return;
      window.__kindlingPulseDemoLiveLog = true;
      window.addEventListener("kindling-live", function (e) {
        var el = document.getElementById("live-log");
        if (el) el.textContent = JSON.stringify(e.detail, null, 2);
      });
    })();
  </script>
</body>
</html>
